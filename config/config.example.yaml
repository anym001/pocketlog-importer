# PocketLog importer — example configuration.
#
# Copy to /config/config.yaml and adjust. The API key is NOT stored here; set
# it via the POCKETLOG_API_KEY environment variable (create the key in the
# PocketLog UI with the "import" scope).

pocketlog:
  base_url: https://pocketlog.example.com
  verify_tls: true

schedule:
  # Standard cron expression (minute hour day month weekday). Hourly by default.
  cron: "0 * * * *"

paths:
  input: /data/input
  processed: /data/processed
  failed: /data/failed
  output: /data/output

# Optional: force a parser by filename glob. Omit to rely on auto-detection.
banks: []
#   - match: "EASYBANK_*.csv"
#     parser: easybank
#   - match: "umsaetzegirokonto_*.csv"
#     parser: dadat

options:
  # Write output CSVs but never push to the API. Useful for a first test run.
  dry_run: false

# Optional: push notifications about run outcomes via a Gotify-compatible
# endpoint (PushBits, Gotify). Off unless `url` is set. The application token
# is NOT stored here; set it via the NOTIFY_TOKEN environment variable.
# notify:
#   type: gotify
#   url: https://pushbits.example.com
#   # "problems" (default) = only failed/unmatched runs and crashes;
#   # "always" also reports clean runs. Idle runs (no input) never notify.
#   events: problems
#   verify_tls: true

# Path to the rules whitelist (see rules.example.yaml).
rules_file: /config/rules.yaml
