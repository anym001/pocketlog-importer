# Rules whitelist for the PocketLog bank importer.
#
# Each rule matches a REGEX (case-insensitive) against the booking text. The
# FIRST matching rule wins — order matters. A booking that matches NO rule is
# dropped (no fallback) and listed in <bank>-<ts>.unmatched.csv for review, so
# you can add a rule for it later. Only matched bookings are imported.
#
# Fields per rule:
#   match        regex tested against the booking text (required)
#   description  overrides the PocketLog description (default: raw booking text)
#   category     PocketLog category name (auto-created if new)
#   tags         list of tag names (auto-created if new)
#   type         optional override "in"/"out" (default: from the amount sign)
#   bank         restrict rule to one parser: "easybank" or "dadat" (default: all)

rules:
  # Income: type: in forces the direction regardless of the sign in the CSV
  - match: "EMPLOYER|PAYROLL"
    description: "Salary"
    category: "Income"
    type: in

  - match: "STREAMINGCO"
    description: "Streaming Service"
    category: "Entertainment"
    tags: [subscription]

  - match: "VIDEOSERVICE"
    description: "Video Service"
    category: "Entertainment"
    tags: [subscription]

  # No description: the raw bank text is used as the description
  - match: "MOBILECARRIER"
    category: "Internet"
    tags: [recurring]

  - match: "ELECTRICITYCO"
    description: "Electricity"
    category: "Housing"
    tags: [recurring]

  - match: "RENTINGCO"
    description: "Rent"
    category: "Housing"
    tags: [recurring, rent]

  - match: "ONLINESHOP"
    description: "Online Shop"
    category: "Clothing"
    tags: [shopping]

  - match: "ATM|CASHWITHDRAWAL"
    description: "Cash withdrawal"
    category: "Cash"
    tags: [cash]

  # bank: restricts the rule to a specific bank
  - match: "INTERNALBOOKING"
    description: "Internal booking"
    category: "Miscellaneous"
    bank: easybank
