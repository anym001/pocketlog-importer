version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # PRs always target dev, never main (branching convention, see
    # CONTRIBUTING.md); main only updates via the dev -> main release PR.
    target-branch: "dev"
    # Bundle every github-actions update into a single weekly PR instead of
    # one PR per action. Avoids the mutual merge conflicts that separate PRs
    # cause once the first one lands (each touches the same pinned-SHA lines
    # in test.yml/dev.yml/build.yml).
    groups:
      github-actions:
        patterns:
          - "*"
