name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  tests:
    uses: ./.github/workflows/test.yml

  release:
    needs: tests
    runs-on: ubuntu-latest
    # Write scopes live on the release job only, never workflow-wide, so the
    # reusable `tests` call above runs read-only.
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: version
        run: |
          NEW_TAG="${GITHUB_REF#refs/tags/}"
          echo "version=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pocketlog-importer:latest
            ghcr.io/${{ github.repository_owner }}/pocketlog-importer:${{ steps.version.outputs.version }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pocketlog-importer:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pocketlog-importer:${{ steps.version.outputs.version }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
