name: dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  tests:
    uses: ./.github/workflows/test.yml

  publish-dev:
    needs: tests
    runs-on: ubuntu-latest
    # Write scopes live on the publishing job only, never workflow-wide, so
    # the reusable `tests` call above runs read-only.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pocketlog-importer:dev
            ghcr.io/${{ github.repository_owner }}/pocketlog-importer:dev-${{ steps.sha.outputs.short }}
          build-args: |
            APP_VERSION=0.0.0.dev0+${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
